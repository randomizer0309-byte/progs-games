    const adaptSize = document.querySelector('.game-container')?.classList.contains('adapt-size');

        style.textContent = "@media only screen and (min-width:1176px){.game-page-grid-left{max-width:calc(100vw - 420px);}}";
        document.head.appendChild(style);

        function scaleIframe() {
            const iframe = document.getElementById('iframe-game');
            const embededSection = document.getElementById('game_embeded_section');
            const w = document.querySelector('.game-container')?.getAttribute('data-game-width');
            const h = document.querySelector('.game-container')?.getAttribute('data-game-height');

            const wrapper = iframe.parentElement;

            const scaleX = wrapper.clientWidth / w;
            const scaleY = wrapper.clientHeight / h;
            const scale = Math.min(scaleX, scaleY);

            embededSection.style.background = "#000";

            iframe.style.transform = `translateX(-50%) scale(${scale})`;
            iframe.style.transformOrigin = "top center";
            iframe.style.left = "50%";
            iframe.style.position = "relative";
            iframe.style.width = w + "px";
            iframe.style.height = h + "px";

        }

        scaleIframe();

        window.addEventListener("resize", scaleIframe);
        window.addEventListener("load", scaleIframe);

    }
</script>
