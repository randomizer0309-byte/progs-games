<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Core Ball</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

<style>
body{
background:#c8c8c8;
margin:0;
overflow:hidden;
font-family:sans-serif;
}

#stage{
width:100vw;
height:100vh;
display:none;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.title{
font-size:50px;
margin-bottom:40px;
}

.play{
width:120px;
height:120px;
border:3px solid #666;
border-radius:20px;
font-size:60px;
line-height:120px;
cursor:pointer;
margin:auto;
}

.play:hover{
background:#ddd;
}
</style>
</head>

<body>

<canvas id="stage"></canvas>

<div id="menu" class="center">
<div class="title">Core Ball</div>

<div class="play" onclick="startGame()">▶</div>

</div>

<script src="js/lib/require.js"></script>
<script src="js/conf/requireConf.js"></script>
<script src="js/page/index.js"></script>

<script>
function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("stage").style.display="block";
}
</script>

</body>
</html>
