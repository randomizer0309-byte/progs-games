<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Core Ball</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

<style>
body{
background-color:#c8c8c8;
overflow:hidden;
padding:0;
margin:0;
}

#stage{
width:100vw;
height:100vh;
display:none;
}

.center-box{
text-align:center;
position:absolute;
width:300px;
height:400px;
margin:-200px 0 0 -150px;
left:50%;
top:50%;
}

.title{
font-size:50px;
font-family:sans-serif;
}

.button{
position:absolute;
width:100px;
height:100px;
left:50%;
top:50%;
margin:-100px 0 0 -50px;
border:2px solid #666;
color:#666;
border-radius:15px;
font-size:55px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#txtAr{
font-size:60px;
line-height:100px;
}

.button .text{
font-size:10px;
padding:0 10px;
width:80px;
}

.op{
position:absolute;
width:200px;
height:100px;
left:50%;
top:70%;
margin:-50px 0 0 -100px;
}
</style>
</head>

<body>

<canvas id="stage"></canvas>

<div id="begin" style="width:100vw;height:100vh;">

<section class="center-box">

<span class="title">Core Ball</span>

<div class="button">
<div id="txtAr">▶</div>
</div>

<div class="op">
<a id="btnFW" href="javascript:;">
<img src="image/btn_fw.png"/>
</a>

<span id="btnReset" style="display:inline-block;margin-left:30px;color:#666">
RESET
</span>

<div id="tip" style="font-size:14px;color:#555;margin-top:15px;display:none;">
Levels Reset
</div>
</div>

</section>

<div style="position:absolute;left:5px;bottom:5px;color:#888;font-size:12px;">
update on 2015-03-20
</div>

<section style="position:absolute;right:5px;bottom:5px;color:#888">
<img style="margin:0 -2px -2px 0;" src="image/WB_logo.png"/>
<span style="display:inline-block;font-size:12px;font-family:sans-serif;">Core Ball</span>
</section>

<section id="wxArrow" style="display:none;">
<div style="position:absolute;width:100%;height:100%;opacity:0.7;background:#000"></div>
<img style="position:absolute;right:25px;" src="image/arrow.png"/>
</section>

</div>

<script src="js/lib/require.js"></script>
<script src="js/conf/requireConf.js"></script>
<script src="js/page/index.js"></script>

</body>
</html>
