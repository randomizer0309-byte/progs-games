<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Core Ball</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet">

<style>
body {
    background-color: #000;
    overflow: hidden;
    padding: 0;
    margin: 0;
    font-family: Lato, sans-serif;
}

/* Canvas */
#stage {
    display: block;
    margin: 0 auto;
    background: #000;
}

/* Start Screen */
#begin {
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    text-align: center;
}

.title {
    font-size: 60px;
    margin-bottom: 40px;
}

/* Play Button */
.button {
    width: 150px;
    height: 150px;
    border: 3px solid white;
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    cursor: pointer;
    transition: 0.2s ease;
}

.button:hover {
    background: white;
    color: black;
    transform: scale(1.05);
}

.level-text {
    margin-top: 15px;
    font-size: 18px;
    opacity: 0.7;
}
</style>
</head>

<body>

<canvas id="stage" width="800" height="600"></canvas>

<div id="begin">
    <div class="title">Core Ball</div>

    <div class="button" onclick="startGame()">
        PLAY
    </div>

    <div class="level-text">Level 1</div>
</div>

<script src="js/jweixin-1.0.0.js"></script>
<script src="js/index.js"></script>

<script>
function startGame() {
    document.getElementById("begin").style.display = "none";
}
</script>

</body>
</html>
