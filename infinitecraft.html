      <meta charset="UTF-8">

      <style>
        #loading-screen {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: #000;
          display: flex;
          justify-content: center;
          align-items: center;
          flex-direction: column;
          z-index: 9999;
          transition: opacity 1s ease;
        }
    
        #loading-screen img {
          width: 200px;
          height: auto;
          margin-bottom: 20px;
          filter: brightness(1.1);
          border: 4px solid #fff;
          border-radius: 12px;
        }
    
        #loading-screen .loading-text {
          color: #fff;
          font-family: 'Arial Black', Arial, sans-serif;
          font-size: 1.5rem;
          text-shadow: 0 0 10px #fff;
        }
    
        #main-content {
          display: none;
        }
      </style>
    
    
    
      <div id="loading-screen" style="opacity: 0; display: none;">
        <img src="https://ik.imagekit.io/h9borfxct/-11-9-2025.png?updatedAt=1762727629446" alt="Loading Image">
        <div class="loading-text">Loading...</div>
      </div>
    
      <div id="main-content" style="display: block;">
        <h1 style="color:white; text-align:center;"></h1>
      </div>
    
      <script>
        window.addEventListener('load', function() {
          setTimeout(() => {
            const loader = document.getElementById('loading-screen');
            loader.style.opacity = '0';
            setTimeout(() => {
              loader.style.display = 'none';
              document.getElementById('main-content').style.display = 'block';
            }, 1000);
          }, 5000);
        });
      </script>
