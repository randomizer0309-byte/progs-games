<html>
<head>
<meta charset="utf-8">
<title>CoreBall</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet">

<style>
body{
    background:black;
    overflow:hidden;
    margin:0;
    font-family:Lato;
}

.center-box{
    text-align:center;
    position:absolute;
    width:300px;
    height:400px;
    margin:-200px 0 0 -150px;
    left:50%;
    top:50%;
}

.title{
    font-size:50px;
    color:#333;
}

.play-btn{
    margin-top:40px;
    padding:15px 40px;
    font-size:22px;
    border-radius:10px;
    border:2px solid #666;
    background:white;
    cursor:pointer;
}

.play-btn:hover{
    background:#eee;
}

.button{
    position:absolute;
    width:100px;
    height:100px;
    left:50%;
    top:50%;
    margin:-100px 0 0 -50px;
    border:2px solid #666;
    color:#666;
    border-radius:15px;
    font-size:55px;
}

.button .text{
    font-size:10px;
    padding:0 10px;
    width:80px;
}

.op{
    position:absolute;
    width:200px;
    height:100px;
    left:50%;
    top:70%;
    margin:-50px 0 0 -100px;
}
</style>
</head>

<body>

<canvas id="stage" width="1358" height="636"></canvas>

<div id="begin" style="background:#c8c8c8;width:100%;height:100%;position:absolute;top:0;left:0;">

<section class="center-box">

<span class="title">Core Ball</span>

<br>

<button class="play-btn" onclick="startGame()">PLAY</button>

<div class="button">
<div id="txtAr" style="margin-top:5px;"></div>
<div class="text">level 1</div>
</div>

<div class="op">
<a id="btnFW" href="javascript:;"></a>

<span id="btnReset" style="display:inline-block;margin-left:30px;color:#666">
RESET
</span>

<div id="tip" style="font-size:14px;color:#555;margin-top:15px;display:none;">
Done
</div>

</div>

</section>

</div>

<script>

function startGame(){
    document.getElementById("begin").style.display="none";
}

</script>

<script src="js/jweixin-1.0.0.js"></script>
<script src="js/index.js"></script>

</body>
</html>
